# docker-compose.ci.yaml — Ephemeral CI Stack
# Optimized for speed (tmpfs), reliability (healthchecks), and determinism.
# Usage: docker compose -f docker-compose.ci.yaml up -d --wait

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: upsilon
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  db-init:
    build:
      context: ./battleui
    command: php artisan migrate:fresh --seed --force
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  app:
    build:
      context: ./battleui
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      - REVERB_HOST=ws
      - REVERB_PORT=8080
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/up" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ws:
    build:
      context: ./battleui
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      - REVERB_HOST=0.0.0.0
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:8080" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  engine:
    build:
      context: .
      dockerfile: ./upsilonapi/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health" ]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  tester:
    build:
      context: .
      dockerfile: ./upsiloncli/Dockerfile
    environment:
      - UPSILON_BASE_URL=http://app
      - REVERB_HOST=ws
      - REVERB_PORT=8080
      - REVERB_APP_KEY=ci_app_key
      - UPSILON_CLI_PATH=upsiloncli
    volumes:
      - ./upsiloncli/samples:/app/upsiloncli/samples
      - ./upsiloncli/tests:/app/upsiloncli/tests
      - ./upsiloncli/internal:/app/upsiloncli/internal
    depends_on:
      app:
        condition: service_healthy
      ws:
        condition: service_healthy
