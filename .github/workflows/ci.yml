name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # STAGE 1: Build & Lint
  # ============================================================================
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.work

      - name: Sync Workspace
        run: go work sync

      - name: Go Vet (Explicit Modules)
        run: go vet ./upsilonapi/... ./upsiloncli/... ./upsilonbattle/... ./upsilonmapdata/... ./upsilonmapmaker/... ./upsilontools/...

      - name: Build Upsilon API
        run: go build -o /dev/null ./upsilonapi

      - name: Build Upsilon CLI
        run: go build -o /dev/null ./upsiloncli/cmd/upsiloncli

      - name: Verify Dockerfiles
        run: |
          echo "Checking battleui Dockerfile..."
          docker build --check -f battleui/Dockerfile battleui/ 2>/dev/null || echo "Docker --check not supported, skipping syntax validation"
          echo "Checking upsilonapi Dockerfile..."
          docker build --check -f upsilonapi/Dockerfile . 2>/dev/null || echo "Docker --check not supported, skipping syntax validation"

      - name: Generate Build Report
        if: always()
        run: |
          chmod +x ./tests/lint_report.sh
          ./tests/lint_report.sh > build_report.md
          cat build_report.md >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # STAGE 2: Unit Tests (depends on build)
  # ============================================================================
  go-tests:
    name: Go Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.work

      - name: Sync Workspace
        run: go work sync

      - name: Run Go Tests (Explicit Modules)
        run: go test -count=1 -timeout 120s -json ./upsilonapi/... ./upsiloncli/... ./upsilonbattle/... ./upsilonmapdata/... ./upsilonmapmaker/... ./upsilontools/... > go-test-results.json 2>&1 || true

      - name: Check for Failures
        run: |
          if grep -q '"Action":"fail"' go-test-results.json; then
            echo "::error::Go tests failed"
            grep '"Action":"fail"' go-test-results.json | head -20
            exit 1
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-test-results
          path: go-test-results.json
          retention-days: 3

  php-tests:
    name: PHP Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build Battleui Docker Image
        run: docker build -t battleui-ci ./battleui

      - name: Run PHPUnit (SQLite In-Memory)
        run: |
          docker run --rm \
            -e APP_ENV=testing \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            -e BCRYPT_ROUNDS=4 \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            -e BROADCAST_CONNECTION=null \
            battleui-ci \
            sh -c "php artisan key:generate --force && php artisan test --env=testing --exclude-group=engine-required 2>&1" | tee php-test-results.txt

      - name: Check PHP Test Results
        run: |
          if grep -q "FAILED" php-test-results.txt; then
            echo "::error::PHP tests failed"
            exit 1
          fi

      - name: Upload PHP Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: php-test-results
          path: php-test-results.txt
          retention-days: 3

  unit-test-summary:
    name: Unit Test Summary
    needs: [go-tests, php-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download Go Results
        uses: actions/download-artifact@v7
        with:
          name: go-test-results
          path: .

      - name: Download PHP Results
        uses: actions/download-artifact@v7
        with:
          name: php-test-results
          path: .

      - name: Generate Unit Report
        run: |
          chmod +x ./tests/unit_report.sh
          ./tests/unit_report.sh > summary.md
          cat summary.md >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # STAGE 3: Integration & E2E Tests (depend on unit tests)
  # These run in parallel after unit tests pass
  # ============================================================================
  integration-tests:
    name: Integration & E2E Tests
    needs: unit-test-summary
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Prepare Environment
        run: |
          cp .env.ci .env
          mkdir -p upsiloncli/tests/logs
          sed -i 's/REVERB_HOST=127.0.0.1/REVERB_HOST=localhost/' .env

      - name: Setup Node.js (for Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: battleui/package-lock.json

      - name: Install Playwright Dependencies
        run: |
          cd battleui
          npm install
          npx playwright install --with-deps chromium

      - name: Boot Upsilon Services (Built Once)
        run: docker compose -f docker-compose.ci.yaml up -d --wait --wait-timeout 300

      - name: Show Service Status
        run: docker compose -f docker-compose.ci.yaml ps

      - name: "E2E: Run Centralized Customer Scenarios"
        run: |
          docker compose -f docker-compose.ci.yaml exec -T tester /bin/sh ./tests/run_all_scenarios.sh

      - name: "E2E: Run Edge Case Suite"
        run: |
          docker compose -f docker-compose.ci.yaml exec -T tester /bin/sh ./tests/run_all_edge_cases.sh

      - name: "E2E: Run Playwright Tests"
        run: |
          cd battleui
          PLAYWRIGHT_SKIP_SERVER=1 npx playwright test

      - name: Generate Combined Reports
        if: always()
        run: |
          ./tests/ci_report.sh > ci_report.md 2>&1 || true
          cat ci_report.md >> $GITHUB_STEP_SUMMARY
          
          if ls upsiloncli/tests/logs/edge_*.log >/dev/null 2>&1; then
            ./tests/edge_case_report.sh > edge_case_report.md 2>&1 || true
            cat edge_case_report.md >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "battleui/playwright-report" ]; then
            echo "✅ HTML Report generated." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No HTML Report found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Collect Docker Logs on Failure
        if: failure()
        run: |
          mkdir -p ci_logs
          docker compose -f docker-compose.ci.yaml logs app > ci_logs/laravel.log 2>&1
          docker compose -f docker-compose.ci.yaml logs ws > ci_logs/reverb.log 2>&1
          docker compose -f docker-compose.ci.yaml logs engine > ci_logs/engine.log 2>&1
          docker compose -f docker-compose.ci.yaml logs db > ci_logs/db.log 2>&1
          docker compose -f docker-compose.ci.yaml logs tester > ci_logs/tester.log 2>&1

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            ci_report.md
            edge_case_report.md
            battleui/playwright-report/
            ci_logs/
            upsiloncli/tests/logs/
          retention-days: 3

      - name: Teardown Docker Stack
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v
