name: E2E Battle Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-battles:
    name: End-to-End Battle Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1. Checkout main repo and all submodules
      - name: Checkout Code with Submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # 2. Setup CI Environment
      - name: Prepare Environment Variables
        run: |
          cp .env.ci .env
          mkdir -p upsiloncli/tests/logs

      # 3. Boot the ephemeral Docker infrastructure
      - name: Boot Upsilon Services
        run: docker compose -f docker-compose.ci.yaml up -d --wait --wait-timeout 300

      - name: Show Service Status
        if: always()
        run: docker compose -f docker-compose.ci.yaml ps


      # 5. BRD Compliance: Password Policy (BRD 3.1)
      - name: "BRD 3.1: Password Policy Check"
        run: |
          docker compose -f docker-compose.ci.yaml exec -T tester upsiloncli --timeout 60 --farm samples/auth_security_check.js > upsiloncli/tests/logs/auth_security.log 2>&1

      # 6. BRD Compliance: Character Progression (BRD 2.5)
      - name: "BRD 2.5: Progression Check"
        run: |
          docker compose -f docker-compose.ci.yaml exec -T tester upsiloncli --timeout 120 --farm samples/progression_check.js samples/progression_check.js > upsiloncli/tests/logs/progression.log 2>&1

      # 7. Battle Engine: Full Mode Battery
      - name: "Engine: Run All Battle Modes"
        run: |
          docker compose -f docker-compose.ci.yaml exec -T tester /bin/sh ./tests/run_all_battles.sh

      # 10. Generate CI Report
      - name: Generate CI Report
        if: always()
        run: |
          ./tests/ci_report.sh > ci_report.md 2>&1 || true
          cat ci_report.md >> $GITHUB_STEP_SUMMARY

      # 11. Collect Docker Logs on Failure
      - name: Collect Docker Logs
        if: failure()
        run: |
          mkdir -p ci_logs
          docker compose -f docker-compose.ci.yaml logs app > ci_logs/laravel.log 2>&1
          docker compose -f docker-compose.ci.yaml logs ws > ci_logs/reverb.log 2>&1
          docker compose -f docker-compose.ci.yaml logs engine > ci_logs/engine.log 2>&1
          docker compose -f docker-compose.ci.yaml logs db > ci_logs/db.log 2>&1
          docker compose -f docker-compose.ci.yaml logs tester > ci_logs/tester.log 2>&1

      # 12. Archive CI Artifacts
      - name: Upload CI Report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-report
          path: ci_report.md
          retention-days: 3

      - name: Upload Battle Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: ci-logs
          path: |
            ci_logs/
            upsiloncli/tests/logs/
          retention-days: 3

      # 13. Teardown
      - name: Teardown Docker Stack
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v
