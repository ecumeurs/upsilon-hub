name: Unit Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.work

      - name: Sync Workspace
        run: go work sync

      - name: Run Go Tests (Explicit Modules)
        run: go test -count=1 -timeout 120s -json ./upsilonapi/... ./upsiloncli/... ./upsilonbattle/... ./upsilonmapdata/... ./upsilonmapmaker/... ./upsilonserializer/... ./upsilontools/... > go-test-results.json 2>&1 || true

      - name: Display Test Results
        if: always()
        run: |
          echo "## Go Test Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Parse JSON test output for final results
          grep -E '"Test":' go-test-results.json | grep '"Action":"pass"' | wc -l | xargs -I{} echo "Passed: {}" >> $GITHUB_STEP_SUMMARY
          grep -E '"Test":' go-test-results.json | grep '"Action":"fail"' | wc -l | xargs -I{} echo "Failed: {}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for Failures
        run: |
          if grep -q '"Action":"fail"' go-test-results.json; then
            echo "::error::Go tests failed"
            grep '"Action":"fail"' go-test-results.json | head -20
            exit 1
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: go-test-results
          path: go-test-results.json
          retention-days: 3

  php-tests:
    name: PHP Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build Battleui Docker Image
        run: docker build -t battleui-ci ./battleui

      - name: Run PHPUnit (SQLite In-Memory)
        run: |
          docker run --rm \
            -e APP_ENV=testing \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            -e BCRYPT_ROUNDS=4 \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            -e BROADCAST_CONNECTION=null \
            battleui-ci \
            sh -c "php artisan key:generate --force && php artisan test --env=testing --exclude-group=engine-required 2>&1" | tee php-test-results.txt

      - name: Check PHP Test Results
        run: |
          if grep -q "FAILED" php-test-results.txt; then
            echo "::error::PHP tests failed"
            exit 1
          fi

      - name: Upload PHP Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: php-test-results
          path: php-test-results.txt
          retention-days: 3

  summary:
    name: Unit Test Summary
    needs: [go-tests, php-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Go Results
        uses: actions/download-artifact@v5
        with:
          name: go-test-results
          path: .

      - name: Download PHP Results
        uses: actions/download-artifact@v5
        with:
          name: php-test-results
          path: .

      - name: Generate Unit Report
        run: |
          chmod +x ./tests/unit_report.sh
          ./tests/unit_report.sh > summary.md
          cat summary.md >> $GITHUB_STEP_SUMMARY
