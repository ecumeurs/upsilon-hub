name: Playwright Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  playwright-e2e:
    name: Playwright E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: battleui/package-lock.json

      - name: Install Dependencies
        run: |
          cd battleui
          npm install
          npx playwright install --with-deps chromium

      - name: Prepare Environment
        run: |
          cp .env.ci .env
          # Ensure Reverb host is localhost for host-to-docker communication
          sed -i 's/REVERB_HOST=127.0.0.1/REVERB_HOST=localhost/' .env

      - name: Boot Docker Stack
        run: docker compose -f docker-compose.ci.yaml up -d --wait --wait-timeout 300

      - name: Show Service Status
        if: always()
        run: docker compose -f docker-compose.ci.yaml ps

      - name: Run Playwright Tests
        run: |
          cd battleui
          PLAYWRIGHT_SKIP_SERVER=1 npx playwright test

      - name: Generate Visual Audit Report
        if: always()
        run: |
          echo "### Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          # Simple summary based on the report folder existence
          if [ -d "battleui/playwright-report" ]; then
            echo "✅ HTML Report generated." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No HTML Report found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: battleui/playwright-report/
          retention-days: 3

      - name: Collect Docker Logs on Failure
        if: failure()
        run: |
          mkdir -p ci_logs
          docker compose -f docker-compose.ci.yaml logs app > ci_logs/laravel.log 2>&1
          docker compose -f docker-compose.ci.yaml logs ws > ci_logs/reverb.log 2>&1
          docker compose -f docker-compose.ci.yaml logs engine > ci_logs/engine.log 2>&1
          docker compose -f docker-compose.ci.yaml logs db > ci_logs/db.log 2>&1

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            ci_logs/
            battleui/tests/playwright/.output/
          retention-days: 3

      - name: Teardown Docker Stack
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v
