# docker-compose.prod.yaml — Production Stack
# Built for persistence, reliability, and automated orchestration.
# Usage: ./scripts/setup_prod.sh && docker compose -f docker-compose.prod.yaml up -d --wait

name: upsilon-prod

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: upsilon
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    ports:
      - "5434:5432" # Changed to 5434 to avoid conflict with host postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  db-init:
    build:
      context: ./battleui
      dockerfile: Dockerfile.prod
      args:
        - VITE_REVERB_APP_KEY=${VITE_REVERB_APP_KEY}
        - VITE_REVERB_HOST=${VITE_REVERB_HOST}
        - VITE_REVERB_PORT=${VITE_REVERB_PORT}
        - VITE_REVERB_SCHEME=${VITE_REVERB_SCHEME}
    user: "33:33" # Run as www-data to ensure log permissions
    command: php artisan migrate --force
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  app:
    build:
      context: ./battleui
      dockerfile: Dockerfile.prod
      args:
        - VITE_REVERB_APP_KEY=${VITE_REVERB_APP_KEY}
        - VITE_REVERB_HOST=${VITE_REVERB_HOST}
        - VITE_REVERB_PORT=${VITE_REVERB_PORT}
        - VITE_REVERB_SCHEME=${VITE_REVERB_SCHEME}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8000:80"
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/up" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ws:
    build:
      context: ./battleui
      dockerfile: Dockerfile.prod
      args:
        - VITE_REVERB_APP_KEY=${VITE_REVERB_APP_KEY}
        - VITE_REVERB_HOST=${VITE_REVERB_HOST}
        - VITE_REVERB_PORT=${VITE_REVERB_PORT}
        - VITE_REVERB_SCHEME=${VITE_REVERB_SCHEME}
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:8080" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  engine:
    build:
      context: .
      dockerfile: ./upsilonapi/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health" ]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  cli:
    build:
      context: .
      dockerfile: ./upsiloncli/Dockerfile
    depends_on:
      app:
        condition: service_healthy
      ws:
        condition: service_healthy
      engine:
        condition: service_healthy
    env_file:
      - .env
    command: tail -f /dev/null

volumes:
  db_data:
