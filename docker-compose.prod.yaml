services:
  app:
    build:
      context: ./battleui
    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:$(php -r 'echo base64_encode(random_bytes(32));') # Placeholder, should be set in env
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=upsilon
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
      - REVERB_HOST=localhost
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - UPSILON_API_URL=http://engine:8081/internal

  ws:
    build:
      context: ./battleui
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=upsilon
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8080
      - UPSILON_API_URL=http://engine:8081/internal

  engine:
    build:
      context: .
      dockerfile: ./upsilonapi/Dockerfile
    depends_on:
      - db

  cli:
    build:
      context: .
      dockerfile: ./upsiloncli/Dockerfile
    depends_on:
      - app
      - ws
      - engine
    environment:
      - UPSILON_BASE_URL=http://app
      - REVERB_HOST=ws:8080
      - REVERB_APP_KEY=${REVERB_APP_KEY}

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: upsilon
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
